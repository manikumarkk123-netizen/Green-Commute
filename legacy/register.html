<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — Green Commute</title>
    <meta name="description" content="Create your Green Commute account and start earning EcoCoins.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="global.css">

    <style>
        body { padding-top: 0; background: var(--surface); }
        .auth-container { min-height: 620px; }
    </style>
</head>

<script>
function validate(){
    var fn = document.getElementById('fname').value;
    localStorage.setItem("firstname", fn);

    var ln = document.getElementById('lname').value;
    localStorage.setItem("lastname", ln);

    var phn = document.getElementById('phone').value;
    localStorage.setItem("phone", phn);

    if(phn.length !== 10){
        alert("Phone number must be 10 digits");
        return false;
    }

    var pwd = document.getElementById('pwd').value;
    localStorage.setItem("password", pwd);

    if(pwd.length > 8 || pwd.length % 2 !== 0){
        alert("Password must be even length and max 8 characters");
        return false;
    }

    var mail = document.getElementById('mailid').value;
    localStorage.setItem("email", mail);

    alert("Registration successful!");
    return true;
}
</script>

<body>

<div class="auth-page">
    <div class="auth-container animate-fade-up">

        <!-- Left: Branding Panel -->
        <div class="auth-branding">
            <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 40px; color: #fff; font-weight: 700; font-size: 18px;">
                <img src="images/logo.png" alt="Logo" style="width:36px; border-radius:8px;">
                <span style="background: linear-gradient(135deg, #4ade80, #facc15); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GreenCommute</span>
            </a>
            <h2>Join the Green Revolution! 🌍</h2>
            <p>Create your account and start making every commute count.</p>

            <ul class="auth-features" style="list-style: none; padding: 0;">
                <li><i class="fa-solid fa-check-circle"></i> Free registration</li>
                <li><i class="fa-solid fa-check-circle"></i> Earn 100 EcoCoins on signup</li>
                <li><i class="fa-solid fa-check-circle"></i> Access to all services</li>
                <li><i class="fa-solid fa-check-circle"></i> Exclusive member rewards</li>
            </ul>
        </div>

        <!-- Right: Register Form -->
        <div class="auth-form-panel">
            <h1>Create Account</h1>
            <p class="auth-sub">Fill in your details to get started</p>

            <form method="POST" action="login.html" onsubmit="return validate()">

                <div class="row g-3">
                    <div class="col-6">
                        <label class="gc-label">First Name</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="fname" class="gc-input" placeholder="First name" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="gc-label">Last Name</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="lname" class="gc-input" placeholder="Last name" required>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label class="gc-label">Phone Number</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" id="phone" class="gc-input" placeholder="10-digit number" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="gc-label">Email Address</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="mailid" class="gc-input" placeholder="you@example.com" required>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label class="gc-label">Date of Birth</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-calendar"></i>
                            <input type="date" class="gc-input" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="gc-label">Username</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-at"></i>
                            <input type="text" class="gc-input" placeholder="Choose username" required>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label class="gc-label">Password</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="pwd" class="gc-input" placeholder="Even, max 8 chars" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="gc-label">Age</label>
                        <div class="gc-input-group">
                            <i class="fa-solid fa-cake-candles"></i>
                            <input type="text" class="gc-input" placeholder="Your age" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-gc btn-primary btn-block btn-lg" style="margin-top: 12px;">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>

            </form>

            <div class="auth-link">
                Already have an account?
                <a href="login.html">Sign in</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
