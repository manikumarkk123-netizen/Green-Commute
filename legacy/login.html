<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Green Commute</title>
    <meta name="description" content="Login to your Green Commute account.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="global.css">

    <style>
        body { padding-top: 0; background: var(--surface); }
    </style>
</head>

<body>

<div class="auth-page">
    <div class="auth-container animate-fade-up">

        <!-- Left: Branding Panel -->
        <div class="auth-branding">
            <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 40px; color: #fff; font-weight: 700; font-size: 18px;">
                <img src="images/logo.png" alt="Logo" style="width:36px; border-radius:8px;">
                <span style="background: linear-gradient(135deg, #4ade80, #facc15); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GreenCommute</span>
            </a>
            <h2>Welcome Back! 👋</h2>
            <p>Login to continue your green journey and access your EcoCoins balance.</p>

            <ul class="auth-features" style="list-style: none; padding: 0;">
                <li><i class="fa-solid fa-check-circle"></i> Track your ride history</li>
                <li><i class="fa-solid fa-check-circle"></i> Manage EcoCoins rewards</li>
                <li><i class="fa-solid fa-check-circle"></i> Book rides faster</li>
                <li><i class="fa-solid fa-check-circle"></i> Get exclusive offers</li>
            </ul>
        </div>

        <!-- Right: Login Form -->
        <div class="auth-form-panel">
            <h1>Sign In</h1>
            <p class="auth-sub">Enter your credentials to continue</p>

            <form onsubmit="return LoginValidate()">
                <label class="gc-label">Email Address</label>
                <div class="gc-input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="email" class="gc-input"
                           placeholder="you@example.com" required>
                </div>

                <label class="gc-label">Password</label>
                <div class="gc-input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="pwd" class="gc-input"
                           placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-gc btn-primary btn-block btn-lg" style="margin-top: 8px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>

            <div class="auth-link">
                Don't have an account?
                <a href="register.html">Create one</a>
            </div>
        </div>

    </div>
</div>

<script>
function LoginValidate(){
    var enteremail = document.getElementById('email').value;
    var enterpassword = document.getElementById('pwd').value;

    var getEmail = localStorage.getItem('email');
    var getPwd = localStorage.getItem('password');

    if(enteremail == getEmail && enterpassword == getPwd){
        localStorage.setItem("loggedInUser", enteremail);
        alert("Login successful!");
        window.location = "index.html";
        return false;
    } else {
        alert("Invalid login details");
        return false;
    }
}
</script>

</body>
</html>
