<!DOCTYPE html>
<html>
<head>
    <title>Cab Booking | Green Commute</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="cab.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            <img src="logo.png" class="logo-img" alt="Logo">
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="rentals.html">Rentals</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Cab</a></li>
                <li class="nav-item"><a class="nav-link" href="rewards.html">Rewards</a></li>
            </ul>
        </div>

    </div>
</nav>

<!-- Hero Section -->
<section class="cab-hero text-center">
    <h1>Book Eco-Friendly Cab 🚕</h1>
    <p>Comfortable, affordable & sustainable rides</p>
</section>

<!-- Booking Section -->
<div class="container booking-section">

    <div class="row g-4">

        <!-- Booking Form -->
        <div class="col-md-6">
            <div class="booking-card">
                <h3>Enter Ride Details</h3>

                <form>

                    <input type="text" class="form-control booking-input"
                        placeholder="Pickup Location" required>

                    <input type="text" class="form-control booking-input"
                        placeholder="Drop Location" required>

                    <input type="date" class="form-control booking-input" required>

                    <input type="time" class="form-control booking-input" required>

                    <select class="form-control booking-input">
                        <option>Select Cab Type</option>
                        <option>Eco Mini</option>
                        <option>Eco Sedan</option>
                        <option>Electric SUV</option>
                    </select>

                    <button type="submit" class="book-btn">Book Now</button>

                </form>
            </div>
        </div>

        <!-- Fare Estimate -->
        <div class="col-md-6">
            <div class="fare-card">
                <h3>Estimated Fare</h3>
                <h2>₹250</h2>
                <p>Base fare calculated for 10 km</p>

                <div class="eco-info">
                    🌱 This ride saves 2kg CO₂ emissions
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
