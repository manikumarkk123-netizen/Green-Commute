<!DOCTYPE html>
<html>
<head>
    <title>Login | Green Commute</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login-register.css">
</head>

<body>

<div class="auth-wrapper">
    <h1>Login</h1>
    <h3>Enter your credentials</h3>

    <form onsubmit="return LoginValidate()">

        <label>Email</label>
        <input type="text" id="email" class="auth-input"
               placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" id="pwd" class="auth-input"
               placeholder="Enter your password" required>

        <button type="submit" class="auth-btn">
            Login
        </button>
    </form>

    <div class="auth-link">
        Not registered?
        <a href="register.html">Create an account</a>
    </div>
</div>

<script>
function LoginValidate(){

    var enteremail = document.getElementById('email').value;
    var enterpassword = document.getElementById('pwd').value;

    var getEmail = localStorage.getItem('email');
    var getPwd = localStorage.getItem('password');

    if(enteremail == getEmail && enterpassword == getPwd){

        // Save login session
        localStorage.setItem("loggedInUser", enteremail);

        alert("Login successful");
        window.location = "index.html";
        return false;

    } else {
        alert("Invalid login details");
        return false;
    }
}
</script>

</body>
</html>
