<!DOCTYPE html>
<html>
<head>
    <title>Green Commute</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {

        const username = localStorage.getItem("loggedInUser");
        const authLinks = document.getElementById("authLinks");
        const registerLink = document.getElementById("registerLink");
        const navbarMenu = document.getElementById("navbarMenu");

        if (username) {

            // Remove Login & Register
            if(authLinks) authLinks.remove();
            if(registerLink) registerLink.remove();

            // Create Username Dropdown
            const userItem = document.createElement("li");
            userItem.className = "nav-item dropdown";

            userItem.innerHTML = `
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                    👤 ${username}
                </a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
                </ul>
            `;

            navbarMenu.appendChild(userItem);

            // Logout Function
            document.addEventListener("click", function(e){
                if(e.target.id === "logoutBtn"){
                    localStorage.removeItem("loggedInUser");
                    window.location.reload();
                }
            });
        }

    });
    </script>
</head>

<body>

<!-- Navbar -->
<div class="container">
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                <img src="logo.png" alt="Logo">
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-right" id="navbarMenu">

                    <li class="nav-item">
                        <a class="nav-link" href="rentals.html">Rentals</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="cab.html">Cab</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="rewards.html">Rewards</a>
                    </li>

                    <!-- Login -->
                    <li class="nav-item" id="authLinks">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>

                    <!-- Register -->
                    <li class="nav-item" id="registerLink">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>
</div>

<!-- Main Content -->
<div class="container">
    <div class="wrapper">
        <div class="row">

            <div class="col-md-6">
                <div class="feature-box">
                    <h1>Welcome to Green Commute</h1>
                </div>

                <div class="ride-box">
                    <form>
                        <input type="text" class="ride-input"
                               placeholder="Enter Pickup Location" required>

                        <input type="text" class="ride-input"
                               placeholder="Enter Drop Location" required>

                        <button type="submit" class="book-btn">
                            Book Ride
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <img src="home-img.png" class="feature-img" alt="Home Image">
            </div>

        </div>
    </div>
</div>

<img src="wave.png" class="width-img" alt="Wave">

</body>
</html>
